apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

group = 'expo.modules.zenterminalvt'
version = '0.1.0'

android {
  namespace "expo.modules.zenterminalvt"
  compileSdk safeExtGet("compileSdkVersion", 35)

  defaultConfig {
    minSdk safeExtGet("minSdkVersion", 26)
    targetSdk safeExtGet("targetSdkVersion", 35)

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++17"
        arguments "-DANDROID_STL=c++_shared"
      }
    }

    ndk {
      abiFilters 'arm64-v8a', 'x86_64'
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
      version "3.22.1"
    }
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    abortOnError false
  }

  publishing {
    singleVariant("release") {
      withSourcesJar()
    }
  }

  sourceSets {
    main {
      jniLibs.srcDirs = ["${project.projectDir}/../libs/android"]
    }
  }
}

repositories {
  mavenCentral()
}

dependencies {
  implementation project(':expo-modules-core')
}

int safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}
